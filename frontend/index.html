<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Playfair+Display:ital,wght@1,500;1,600&display=swap"
      rel="stylesheet"
    />
    <!-- Apply stored theme before CSS renders to prevent flash of wrong colour scheme. -->
    <script>try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
    <!-- Default meta; per-route values are set at runtime by usePageMeta and
         baked into static HTML at build time by the prerender step. -->
    <title>Utsav Ranjan — Full Stack Developer & Software Engineer</title>
    <meta
      name="description"
      content="Utsav Ranjan is a full-stack software engineer and freelance developer specialising in React, TypeScript, Node.js, Python and AI tools."
    />
    <link rel="canonical" href="https://utsavranjan.info/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Utsav Ranjan" />
    <meta property="og:title" content="Utsav Ranjan — Full Stack Developer & Software Engineer" />
    <meta property="og:description" content="Full-stack software engineer and freelance developer specialising in React, TypeScript, Node.js, Python and AI tools." />
    <meta property="og:url" content="https://utsavranjan.info/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Utsav Ranjan — Full Stack Developer & Software Engineer" />
    <meta name="twitter:description" content="Full-stack software engineer and freelance developer specialising in React, TypeScript, Node.js, Python and AI tools." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
